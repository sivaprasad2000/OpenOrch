name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # -----------------------------------------------
  # API
  # -----------------------------------------------

  api-lint:
    name: "API: Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app tests scripts

      - name: Ruff format check
        run: ruff format --check app tests scripts

      - name: MyPy
        run: mypy app

  api-test:
    name: "API: Tests (${{ matrix.suite }})"
    runs-on: ubuntu-latest
    needs: api-lint
    defaults:
      run:
        working-directory: apps/api
    strategy:
      fail-fast: false
      matrix:
        suite: [repositories, services, routes]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci
        run: pytest tests/${{ matrix.suite }}/ -v --cov=app --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage.xml
          flags: api-${{ matrix.suite }}
          fail_ci_if_error: false

  # -----------------------------------------------
  # Web
  # -----------------------------------------------

  web-lint:
    name: "Web: Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run type-check

      - name: Prettier
        run: npm run format:check

  web-build:
    name: "Web: Build"
    runs-on: ubuntu-latest
    needs: web-lint
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci
      - run: npm run build
